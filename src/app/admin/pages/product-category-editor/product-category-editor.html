<div class="editor">
  <div class="editor-header">
    <h1 class="page-title">{{ form.get('name')?.value || slug }}</h1>
    <button class="btn-save" (click)="save()" [disabled]="saving() || form.invalid">
      {{ saving() ? 'Saving…' : 'Save changes' }}
    </button>
  </div>

  @if (loadError()) { <div class="alert-error">{{ loadError() }}</div> }
  @if (saveSuccess()) { <div class="alert-success">Saved successfully!</div> }

  <form [formGroup]="form">

    <section class="editor-section">
      <h2 class="section-title">Category Details</h2>
      <div class="fields-grid">
        <div class="field"><label>Name</label><input type="text" formControlName="name" /></div>
        <div class="field"><label>Emoji</label><input type="text" formControlName="emoji" /></div>
        <div class="field full"><label>Cover image path</label><input type="text" formControlName="cover_image" /></div>
        <div class="field full"><label>Description</label><textarea rows="3" formControlName="description"></textarea></div>
      </div>
    </section>

    <section class="editor-section">
      <h2 class="section-title">Products</h2>
      <div class="array-header">
        <h3></h3>
        <button type="button" class="btn-add" (click)="addProduct()">+ Add product</button>
      </div>
      @for (p of productsArray.controls; track $index) {
        <div class="array-row" [formGroup]="productGroup($index)">
          <div class="field flex2"><label>Name</label><input type="text" formControlName="name" /></div>
          <div class="field flex1"><label>Sublabel</label><input type="text" formControlName="sublabel" /></div>
          <div class="field flex2"><label>Image path</label><input type="text" formControlName="image" /></div>
          <button type="button" class="btn-remove" (click)="removeProduct($index)">✕</button>
        </div>
      }
    </section>

  </form>
</div>
