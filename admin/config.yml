backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

# Enable editorial workflow (optional draft/review before publishing)
# publish_mode: editorial_workflow

collections:

  # ─────────────────────────────────────────
  # HOMEPAGE
  # ─────────────────────────────────────────
  - name: "homepage"
    label: "🏠 Home Page"
    files:
      - name: "home"
        label: "Home Page Content"
        file: "content/pages/home.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Main Headline", name: "headline", widget: "string", default: "Global Exporters of Premium Agricultural Products" }
              - { label: "Sub Headline", name: "subheadline", widget: "string", default: "Delivering nature's finest from farm to world" }
              - { label: "Badge Text", name: "badge", widget: "string", default: "Trusted Globally Since 2010" }
              - { label: "CTA Button Text", name: "cta_text", widget: "string", default: "Explore Products" }
              - { label: "Hero Background Image", name: "hero_image", widget: "image" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "num", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "About Preview Section"
            name: "about_preview"
            widget: "object"
            fields:
              - { label: "Heading Line 1", name: "heading1", widget: "string", default: "Rooted in India," }
              - { label: "Heading Line 2 (italic gold)", name: "heading2", widget: "string", default: "Reaching the World" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }
              - { label: "Main Image", name: "image_main", widget: "image" }
              - { label: "Accent Image", name: "image_accent", widget: "image" }
              - { label: "Badge Number", name: "badge_num", widget: "string", default: "15+" }
              - { label: "Badge Label", name: "badge_label", widget: "string", default: "Years of Excellence" }

          - label: "Why Choose Us"
            name: "why_us"
            widget: "object"
            fields:
              - { label: "Section Heading", name: "heading", widget: "string", default: "Excellence at Every Step of the Journey" }
              - label: "Feature Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "desc", widget: "text" }
                  - { label: "Icon (emoji)", name: "icon", widget: "string" }

          - label: "CTA Section"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Sub Text", name: "subtext", widget: "text" }
              - { label: "CTA Image", name: "image", widget: "image" }

  # ─────────────────────────────────────────
  # ABOUT PAGE
  # ─────────────────────────────────────────
  - name: "about"
    label: "🏢 About Page"
    files:
      - name: "about"
        label: "About Page Content"
        file: "content/pages/about.json"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string", default: "Trusted Exporters, Global Partners" }
          - { label: "Page Subtext", name: "subtext", widget: "text" }
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - label: "Company Introduction"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraph 1", name: "para1", widget: "text" }
              - { label: "Paragraph 2", name: "para2", widget: "text" }
              - { label: "Paragraph 3", name: "para3", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
          - label: "Key Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Vision"
            name: "vision"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Our Vision" }
              - { label: "Content", name: "content", widget: "text" }
          - label: "Mission"
            name: "mission"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Our Mission" }
              - { label: "Content", name: "content", widget: "text" }

  # ─────────────────────────────────────────
  # PRODUCTS
  # ─────────────────────────────────────────
  - name: "product_categories"
    label: "📦 Product Categories"
    files:
      - name: "spices"
        label: "🌶 Spices"
        file: "content/products/spices.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Spices" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🌶" }
          - { label: "Category Image (for home grid)", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "oilseeds"
        label: "🌻 Oil Seeds"
        file: "content/products/oilseeds.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Oil Seeds" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🌻" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "edibleoils"
        label: "🫙 Edible Oils"
        file: "content/products/edibleoils.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Edible Oils" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🫙" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "sugar"
        label: "🍬 Sugar"
        file: "content/products/sugar.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Sugar" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🍬" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "rice"
        label: "🌾 Rice"
        file: "content/products/rice.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Rice" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🌾" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "raisins"
        label: "🍇 Raisins"
        file: "content/products/raisins.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Raisins" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🍇" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "agri"
        label: "🧅 Agriculture Products"
        file: "content/products/agri.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Agriculture Products" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🧅" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

      - name: "pulses"
        label: "🫘 Pulses"
        file: "content/products/pulses.json"
        fields:
          - { label: "Category Name", name: "name", widget: "string", default: "Pulses" }
          - { label: "Emoji", name: "emoji", widget: "string", default: "🫘" }
          - { label: "Category Image", name: "cover_image", widget: "image" }
          - { label: "Short Description", name: "description", widget: "string" }
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Sub-label / Grade", name: "sublabel", widget: "string" }
              - { label: "Product Image", name: "image", widget: "image" }

  # ─────────────────────────────────────────
  # CONTACT / COMPANY INFO
  # ─────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Company Settings"
    files:
      - name: "contact"
        label: "Contact & Company Info"
        file: "content/pages/contact.json"
        fields:
          - { label: "Company Name", name: "company_name", widget: "string", default: "TWAM GLOBAL" }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }

          # ── Hero (leave blank to hide) ──
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - { label: "Hero Tag Label", name: "hero_tag", widget: "string", required: false, hint: "e.g. Get In Touch — leave blank to hide" }
          - { label: "Hero Heading (HTML ok)", name: "hero_heading", widget: "string", required: false, hint: "e.g. Let's Start a<br><em>Conversation</em>" }
          - { label: "Hero Sub Text", name: "hero_subtext", widget: "text", required: false }

          # ── Info panel ──
          - { label: "Info Panel Heading", name: "info_heading", widget: "string", required: false }
          - { label: "Info Panel Sub Text", name: "info_subtext", widget: "text", required: false }

          # ── Form panel ──
          - { label: "Form Panel Heading", name: "form_heading", widget: "string", required: false }
          - { label: "Form Panel Sub Text", name: "form_subtext", widget: "text", required: false }

          # ── Contact details (leave blank = hidden on page) ──
          - { label: "Email (Primary)", name: "email1", widget: "string", required: false }
          - { label: "Email (Secondary / Exports)", name: "email2", widget: "string", required: false }
          - { label: "Phone 1", name: "phone1", widget: "string", required: false }
          - { label: "Phone 2 / WhatsApp", name: "phone2", widget: "string", required: false }
          - { label: "Address Line 1 (Company Name)", name: "address1", widget: "string", required: false }
          - { label: "Address Line 2 (Street)", name: "address2", widget: "string", required: false }
          - { label: "Address Line 3 (City, PIN)", name: "address3", widget: "string", required: false }
          - { label: "Business Hours", name: "hours", widget: "string", required: false }

          # ── Map ──
          - { label: "Map City Heading", name: "city_heading", widget: "string", required: false }
          - { label: "Google Maps URL", name: "maps_url", widget: "string", required: false, hint: "Leave blank to hide the Open in Maps button" }

          # ── Quick strip ──
          - { label: "Strip — Response Time", name: "strip_response_time", widget: "string", required: false, hint: "e.g. Within 24 working hours — leave blank to hide" }
          - { label: "Strip — Countries", name: "strip_countries", widget: "string", required: false, hint: "e.g. 50+ Countries Worldwide — leave blank to hide" }

          - { label: "Founded Year", name: "founded", widget: "string", default: "2010", required: false }
          - label: "Certifications"
            name: "certifications"
            widget: "list"
            required: false
            field: { label: "Certification Name", name: "cert", widget: "string" }
          - { label: "Footer About Text", name: "footer_text", widget: "text", required: false }
